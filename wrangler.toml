# Cloudflare Worker 部署設定（booking-worker.js）
# 用法：
#   1. 安裝：npm i -g wrangler
#   2. 登入：wrangler login
#   3. 設定機密（見下方，逐一執行 wrangler secret put）
#   4. 部署：wrangler deploy
#
# 非機密、可公開的設定放在 [vars]；金鑰類用 `wrangler secret put` 設定（不要寫在這裡）。

name = "booking-api"
main = "booking-worker.js"
compatibility_date = "2024-11-01"

[vars]
FIREBASE_PROJECT_ID = "relax-clinic"
# LIFF 頁所在網域（CORS）。部署 booking.html 後填入，例如：
# ALLOWED_ORIGIN = "https://relax-clinic.pages.dev"
ALLOWED_ORIGIN = "*"
# 共用日曆「鈞&萱」的日曆 ID（非機密）。服務帳號已被加入此日曆共用（權限：變更活動）。
GOOGLE_CALENDAR_ID = "6na5qt4rs0gjrealc7r5o0oit8@group.calendar.google.com"

# ── 以下為「機密」，請用指令設定，不要寫進檔案 ──
# wrangler secret put FIREBASE_CLIENT_EMAIL
# wrangler secret put FIREBASE_PRIVATE_KEY          # 服務帳號 JSON 內的 private_key（含換行 \n）
# wrangler secret put LINE_CHANNEL_ID               # 用來驗證客戶 id token
# wrangler secret put LINE_CHANNEL_ACCESS_TOKEN     # Messaging API 推播用
# wrangler secret put THERAPIST_SHARED_SECRET       # 後台呼叫推播的共享密鑰（自訂一串亂碼）
